{% extends 'newsletter/base.html' %}

{% block title %}{{ form_title }}{% endblock %}

{% block content %}
<header>
    <h1>{{ form_title }}</h1>
    <a href="{% url 'mailing_list' %}" class="btn btn-secondary mb-3">Назад к списку рассылок</a>
</header>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="{{ form.start_time.id_for_label }}">Дата начала</label>
        {{ form.start_time }}
    </div>
    <div class="form-group">
        <label for="{{ form.end_time.id_for_label }}">Дата окончания</label>
        {{ form.end_time }}
    </div>
    <div class="form-group">
        <label for="{{ form.status.id_for_label }}">Статус</label>
        {{ form.status }}
    </div>
    <div class="form-group">
        <label for="{{ form.message.id_for_label }}">Сообщение</label>
        {{ form.message }}
    </div>
    <div class="form-group">
        <label for="{{ form.clients.id_for_label }}">Получатели</label>
        {{ form.clients }}
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
</form>
{% endblock %}
