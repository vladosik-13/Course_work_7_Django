{% extends 'newsletter/base.html' %}

{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
<header>
    <h1>Подтверждение удаления</h1>
</header>
<p>Вы уверены, что хотите удалить "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'home' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
