{% extends 'newsletter/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<header>
    <h1>Регистрация</h1>
</header>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

</form>
<a href="{% url 'login' %}" class="btn btn-secondary">Вход</a>
{% endblock %}
